services:
  - type: web
    name: school-dashboard-api
    runtime: docker
    plan: free
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: BCRYPT_SALT_ROUNDS
        value: "12"
      - key: CORS_ORIGIN
        sync: false
      - key: REDIS_URL
        sync: false
      - key: DB_POOL_SIZE
        value: "10"
      - key: DB_POOL_IDLE_TIMEOUT_MS
        value: "30000"
      - key: DB_POOL_CONNECTION_TIMEOUT_MS
        value: "5000"
      - key: SLOW_QUERY_THRESHOLD_MS
        value: "200"
      - key: SENTRY_DSN
        sync: false
