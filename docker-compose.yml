services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: school_dashboard
      POSTGRES_PASSWORD: school_dashboard_dev
      POSTGRES_DB: school_dashboard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U school_dashboard -d school_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
